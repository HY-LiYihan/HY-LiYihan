# Jekyll 配置
title: Project Docs
description: 项目文档站点
baseurl: "/HY-LiYihan"  # GitHub 仓库名，部署后子路径
url: "https://hy-liyihan.github.io"

# Markdown 解析
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 默认布局：所有 MD/HTML 文件自动套用 default 布局
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# 插件（GitHub Pages 安全白名单）
plugins:
  - jekyll-seo-tag

# 排除不需要处理的文件
exclude:
  - Chinese_CV.md
  - English_CV.md
